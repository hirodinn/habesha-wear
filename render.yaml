services:
  - type: web
    name: habesha-wear-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SEED_ON_BOOT
        value: true
      - key: SEED_FILE_PATH
        value: seed/data.json
      - key: SEED_FLAG_KEY
        value: initial_seed_v1_done
      - key: MONGO_URI
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
